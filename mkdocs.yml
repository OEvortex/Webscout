site_name: LLM4Free
site_description: Free OpenAI-compatible API for 40+ LLM providers
site_url: https://llm4free.readthedocs.io
repo_url: https://github.com/OEvortex/Webscout
repo_name: OEvortex/Webscout
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: spacy
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quick Start: examples/basic-chat.md
      - Examples: examples/README.md
  - API Reference:
      - Client: api/client.md
      - Server: api/server.md
      - Providers: api/providers.md
      - Search: api/search.md
  - User Guide:
      - Models: models.md
      - CLI: cli.md
      - OpenAI Server: openai-api-server.md
      - Tool Calling: tool-calling.md
      - Streaming: examples/streaming-responses.md
  - Development:
      - Architecture: architecture.md
      - Contributing: contributing.md
      - Provider Development: provider-development.md
  - Deployment:
      - Docker: DOCKER.md
      - Deployment: deployment.md
  - Extra:
      - Git API: gitapi.md
      - Search Engines: search.md
      - Troubleshooting: troubleshooting.md
